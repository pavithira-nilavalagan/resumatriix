<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ResuMatrix</title>
  <link rel="icon" type="image/png" href="image/resumatrix.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col justify-between">

  <div class="max-w-7xl w-full mx-auto px-4 py-6">
    <a href="index.html" class="inline-flex gap-2 items-center text-slate-500 hover:text-slate-700 transition-all text-sm font-medium">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
    </a>
  </div>

  <div class="max-w-md w-full mx-auto px-4 pb-24">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8 relative overflow-hidden">
      
      <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>

      <div class="text-center mb-6">
        <div class="inline-flex p-3 bg-blue-50 text-blue-600 rounded-full mb-3">
          <i data-lucide="log-in" class="w-6 h-6"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
        <p class="text-xs text-gray-400 mt-1">Sign in to manage and build your professional resumes</p>
      </div>

      <div id="auth-alert" class="hidden mb-4 p-3 rounded text-xs font-medium border"></div>

      <form id="signin-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 tracking-wider">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input type="email" id="email" required placeholder="name@example.com"
              class="w-full pl-9 p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm transition-all bg-gray-50/30 focus:bg-white">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 tracking-wider">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input type="password" id="password" required placeholder="••••••••"
              class="w-full pl-9 p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm transition-all bg-gray-50/30 focus:bg-white">
          </div>
        </div>

        <button type="submit" id="btn-submit"
          class="w-full bg-gradient-to-br from-blue-600 to-indigo-600 text-white font-medium shadow hover:opacity-95 transition-all rounded-md py-2.5 text-sm cursor-pointer flex items-center justify-center gap-2 mt-2">
          Sign In <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
      </form>

      <div class="mt-6 pt-4 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-500">
          Don't have an account yet? 
          <a href="signup.html" class="text-blue-600 font-semibold hover:underline">Sign up free</a>
        </p>
      </div>

    </div>
  </div>

  <div></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      
      // Redirect loop verification rule checking if user context is already live
      if (localStorage.getItem('currentUser')) {
        window.location.href = 'index.html';
      }

      const form = document.getElementById('signin-form');
      const alertBox = document.getElementById('auth-alert');
      const btnSubmit = document.getElementById('btn-submit');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        // Visual loading feedback sequence matching builder app configuration states
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = `<svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Validating...`;

        setTimeout(() => {
          const users = JSON.parse(localStorage.getItem('users')) || [];
          const userFound = users.find(u => u.email === email && u.password === password);

          if (userFound) {
            // Write session context object token parameters cleanly
            localStorage.setItem('currentUser', JSON.stringify({
              name: userFound.name,
              email: userFound.email
            }));
            
            alertBox.className = "mb-4 p-3 rounded text-xs font-medium border bg-green-50 text-green-700 border-green-200 block";
            alertBox.textContent = "Authentication successful! Redirecting...";
            
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 600);
          } else {
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = `Sign In <i data-lucide="chevron-right" class="w-4 h-4"></i>`;
            lucide.createIcons();
            
            alertBox.className = "mb-4 p-3 rounded text-xs font-medium border bg-red-50 text-red-700 border-red-200 block";
            alertBox.textContent = "Invalid email address or security password verification failure.";
          }
        }, 500);
      });
    });
  </script>
</body>

</html>
