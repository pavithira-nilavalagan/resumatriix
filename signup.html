<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | ResuMatrix</title>
  <link rel="icon" type="image/png" href="image/resumatrix.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col justify-between">

  <div class="max-w-7xl w-full mx-auto px-4 py-6">
    <a href="index.html" class="inline-flex gap-2 items-center text-slate-500 hover:text-slate-700 transition-all text-sm font-medium">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
    </a>
  </div>

  <div class="max-w-md w-full mx-auto px-4 pb-24">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8 relative overflow-hidden">
      
      <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-green-500 to-teal-600"></div>

      <div class="text-center mb-6">
        <div class="inline-flex p-3 bg-green-50 text-green-600 rounded-full mb-3">
          <i data-lucide="user-plus" class="w-6 h-6"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Create Account</h2>
        <p class="text-xs text-gray-400 mt-1">Get immediate, unrestricted access to dynamic single-page resumes</p>
      </div>

      <div id="auth-alert" class="hidden mb-4 p-3 rounded text-xs font-medium border"></div>

      <form id="signup-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 tracking-wider">Full Name</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i data-lucide="user" class="w-4 h-4"></i>
            </span>
            <input type="text" id="fullname" required placeholder="John Doe"
              class="w-full pl-9 p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm transition-all bg-gray-50/30 focus:bg-white">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 tracking-wider">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input type="email" id="email" required placeholder="name@example.com"
              class="w-full pl-9 p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm transition-all bg-gray-50/30 focus:bg-white">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 tracking-wider">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input type="password" id="password" required placeholder="••••••••" minlength="6"
              class="w-full pl-9 p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm transition-all bg-gray-50/30 focus:bg-white">
          </div>
        </div>

        <button type="submit" id="btn-submit"
          class="w-full bg-gradient-to-br from-green-600 to-teal-600 text-white font-medium shadow hover:opacity-95 transition-all rounded-md py-2.5 text-sm cursor-pointer flex items-center justify-center gap-2 mt-2">
          Register Account <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
      </form>

      <div class="mt-6 pt-4 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-500">
          Already have an account? 
          <a href="signin.html" class="text-blue-600 font-semibold hover:underline">Sign in instead</a>
        </p>
      </div>

    </div>
  </div>

  <div></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      if (localStorage.getItem('currentUser')) {
        window.location.href = 'index.html';
      }

      const form = document.getElementById('signup-form');
      const alertBox = document.getElementById('auth-alert');
      const btnSubmit = document.getElementById('btn-submit');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const name = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        btnSubmit.disabled = true;
        btnSubmit.innerHTML = `<svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Creating Account...`;

        setTimeout(() => {
          let users = JSON.parse(localStorage.getItem('users')) || [];
          
          if (users.some(u => u.email === email)) {
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = `Register Account <i data-lucide="check" class="w-4 h-4"></i>`;
            lucide.createIcons();

            alertBox.className = "mb-4 p-3 rounded text-xs font-medium border bg-red-50 text-red-700 border-red-200 block";
            alertBox.textContent = "This email address is already registered.";
            return;
          }

          // Append to user list array
          users.push({ name, email, password });
          localStorage.setItem('users', JSON.stringify(users));

          // Directly authenticate registration state
          localStorage.setItem('currentUser', JSON.stringify({ name, email }));

          alertBox.className = "mb-4 p-3 rounded text-xs font-medium border bg-green-50 text-green-700 border-green-200 block";
          alertBox.textContent = "Registration successful! Loading builder profile context...";

          setTimeout(() => {
            window.location.href = 'index.html';
          }, 800);
        }, 400);
      });
    });
  </script>
</body>

</html>
